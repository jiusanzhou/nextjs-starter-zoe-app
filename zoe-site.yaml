# 博客配置
blog:
  title: 博客
  description: 写代码、造工具、记录过程
  basePath: /blog
  postsPerPage: 10

# 内容目录
contentDirs:
  - content

# 自定义节点类型
contentTypes:
  - name: post
    path: posts
    template: post
  - name: page
    path: pages
    template: page
  - name: project
    path: projects
    template: project

# GitHub 项目（自动拉取）
projects:
  provider: github
  owners:
    - jiusanzhou

# RSS 配置
rss:
  enabled: true
  path: /rss.xml
  title: Zoe's Blog

# 评论系统
comments:
  provider: giscus
  repo: ""
  repoId: ""
  category: ""
  categoryId: ""

# Google Analytics
analytics:
  googleId: ""
