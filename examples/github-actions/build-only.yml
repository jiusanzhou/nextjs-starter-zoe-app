name: Build (CI only)

# Build without deploying — useful for PR previews or pre-deploy validation.

on:
  push:
    branches-ignore: [main]
  pull_request:
  workflow_dispatch:

env:
  ZOE_THEME_REPO: jiusanzhou/nextjs-starter-zoe-app
  ZOE_THEME_BRANCH: main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Cache theme
        uses: actions/cache@v4
        with:
          path: ~/.cache/zoe-site
          key: ${{ runner.os }}-zoe-${{ env.ZOE_THEME_REPO }}-${{ env.ZOE_THEME_BRANCH }}

      - name: Build site
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          curl -sSL "https://raw.githubusercontent.com/${ZOE_THEME_REPO}/${ZOE_THEME_BRANCH}/scripts/zoe-site.sh" \
            | bash -s build

      - uses: actions/upload-artifact@v4
        with:
          name: site-${{ github.sha }}
          path: out/
          retention-days: 7
