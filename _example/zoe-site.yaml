# Zoe Site Example Configuration
# YAML 驱动的站点配置文件

primaryColor: black

title: ZoeAPP
description: A starter template for zoe app.
url: https://example.com
logo: /images/logo.png
lang: zh-CN

# 显示在 logo 右侧的版本号
version: alpha

# 作者信息
author:
  name: Zoe
  email: hi@zoe.im
  homepage: https://zoe.im
  avatar: https://github.com/jiusanzhou.png
  minibio: 知行合一，不将有限的生命献给无知、平庸和低俗。
  github: jiusanzhou
  twitter: jiusanzhou
  telegram: noboddyim

# 组织信息（页脚显示）
organization:
  name: ZoeAPP
  url: https://zoe.im
  logo: /images/logo.png

# 版权信息
copyright:
  from: 2011
  holder: Zoe
  location: Hangzhou

# 主题风格
# 可选: default, cyber, minimal, apple, github, vercel, stripe
theme: default

# 导航菜单
navs:
  - title: 首页
    href: /
  - title: 博客
    href: /blog
  - title: 项目
    href: /projects
  - title: 价格
    href: /pricing
  - title: 帮助
    href: /help
  - title: 关于
    href: /about

# 页脚链接
links:
  - title: Home
    category: Company
    href: /
  - title: About
    category: Company
    href: /about
  - title: Blog
    category: Company
    href: /blog
  - title: Help Center
    category: Plugins
    href: /help
  - title: App landing
    category: Plugins
    href: /app-landing
  - title: Projects
    category: Open Source
    href: /projects

# 社交链接（页脚）
socials:
  email: hi@zoe.im
  github: https://github.com/jiusanzhou
  twitter: https://twitter.com/jiusanzhou
  facebook: https://facebook.com/jiusanzhou
  telegram: https://t.me/jiusanzhou
  linkedin: https://linkedin.com/in/johnzoe
  rss: /rss.xml

# 博客配置
blog:
  title: 博客文章
  description: 写作亦是一种自我学习的方式
  basePath: /blog
  postsPerPage: 10

# 内容目录（相对于项目根目录）
contentDirs:
  - content

# Git 远程内容源（构建时自动克隆/更新）
# gitContent:
#   - name: my-content
#     remote: https://github.com/user/repo.git
#     branch: main
#     local: .cache/git-content/my-content

# 自定义节点类型
contentTypes:
  - name: post
    path: posts
    template: post
  - name: page
    path: pages
    template: page
  - name: project
    path: projects
    template: project

# RSS 配置
rss:
  enabled: true
  path: /rss.xml
  title: ZoeAPP RSS Feed

# App Releases — 自动从 GitHub / Gitee 拉取并展示在 /releases 落地页
# 详细文档：docs/releases.md
#
# 简写：单仓库
# releaseRepo: "owner/repo"
#
# 完整：多仓库 + 自定义资源匹配
# releaseRepo:
#   - provider: github
#     repo: owner/repo
#     assetRegexPatterns:
#       android: "myapp-android-.*\\.apk$"
#       macos: "myapp-mac-(arm64|x64)\\.dmg$"
#       windows: "myapp-win-x64-setup\\.exe$"
#   - provider: gitee
#     repo: owner/repo

# GitHub 项目（自动从 API 获取）
projects:
  provider: github
  tag: zoe-lab
  owners:
    - jiusanzhou

# 独立产品（手动维护，区别于 GitHub repos）
# 每个产品的 `image` 推荐复用站点本身的 og:image (1200x630)
products:
  - slug: example-saas
    name: Example SaaS
    tagline: 一句话讲清产品价值
    url: https://example.com
    image: https://example.com/opengraph-image
    status: live              # idea | building | live | paused | sunset
    category: SaaS            # 任意分类标签
    launchedAt: '2025-12'
    tags: [Next.js, AI]
    featured: true            # 顶部大卡片
  - slug: example-tool
    name: Example Tool
    tagline: 另一个产品
    url: https://example.dev
    image: https://example.dev/opengraph-image
    status: building
    category: Tool
    launchedAt: '2026'

# Help/QA 系统（从 GitHub Issues 获取）
helpqa:
  provider: github
  repo: jiusanzhou/gatsby-starter-zoe-app
  labelPrefix: help

# 评论系统
comments:
  provider: giscus
  repo: jiusanzhou/jiusanzhou.github.io
  repoId: "MDEwOlJlcG9zaXRvcnkxMzQ2MDAzMDM="
  categoryId: "DIC_kwDOCAXWb84B-qn9"
  # category: Announcements

# Google Analytics
analytics:
  googleId: ""

# 价格页面配置
pricing:
  enabled: true
  title: 选择适合您的方案
  description: 简单透明的定价，无隐藏费用
  yearlyDiscount: 20
  showToggle: true
  
  # 全局功能定义
  featureDefinitions:
    - id: projects
      name: 项目数量
    - id: storage
      name: 存储空间
    - id: support
      name: 技术支持
    - id: api
      name: API 访问
    - id: domain
      name: 自定义域名
    - id: priority
      name: 优先支持
  
  plans:
    - id: free
      name: 免费版
      description: 适合个人用户体验
      price: 0
      priceUnit: /月
      currency: ¥
      features:
        projects: "5 个"
        storage: "1GB"
        support: "社区"
        api: false
        domain: false
        priority: false
      cta: 免费开始
      ctaLink: "#free"

    - id: pro
      name: 专业版
      description: 适合专业开发者和小团队
      price: 49
      priceUnit: /月
      currency: ¥
      originalPrice: 99
      popular: true
      features:
        projects: "无限"
        storage: "10GB"
        support: "邮件"
        api: true
        domain: true
        priority: false
      cta: 立即升级
      ctaLink: "#pro"
      badge: 最受欢迎

    - id: enterprise
      name: 企业版
      description: 适合大型团队和企业
      price: 199
      priceUnit: /月
      currency: ¥
      features:
        projects: "无限"
        storage: "无限"
        support: "专属客户经理"
        api: "无限制"
        domain: "多个"
        priority: true
      cta: 联系销售
      ctaLink: "#enterprise"

# Homepage Hero (example)
hero:
  greeting: '👋 Hey, I am Zoe'
  typingTexts:
    - Building AI tools
    - Open source projects
    - Passive income systems
  description: 'Full-stack developer · Building sustainable income systems with code and AI'
  cta:
    - text: Read Blog
      href: /blog
    - text: GitHub
      href: https://github.com/jiusanzhou

# Homepage Sections (example)
sections:
  - title: What I'm Doing
    description: Current focus areas
    items:
      - icon: '🛠'
        title: AI Dev Tools
        description: Multi-agent systems, content distribution CLI, mobile AI agents.
      - icon: '✍️'
        title: Technical Writing
        description: AI + developer tools. Write drafts, auto-distribute to platforms.
      - icon: '💰'
        title: Passive Income
        description: Building passive income systems from scratch, with monthly public reports.
